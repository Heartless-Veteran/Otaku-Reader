<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45B7D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)"/>
  
  <!-- Open book icon -->
  <g transform="translate(256, 256)">
    <!-- Left page -->
    <path d="M-120,-80 Q-60,-100 0,-80 L0,120 Q-60,100 -120,120 Z" 
          fill="url(#bookGrad)" stroke="#333" stroke-width="4"/>
    
    <!-- Right page -->
    <path d="M120,-80 Q60,-100 0,-80 L0,120 Q60,100 120,120 Z" 
          fill="url(#bookGrad)" stroke="#333" stroke-width="4"/>
    
    <!-- Book spine -->
    <line x1="0" y1="-80" x2="0" y2="120" stroke="#333" stroke-width="6"/>
    
    <!-- Manga panel lines (left page) -->
    <rect x="-100" y="-60" width="80" height="50" rx="4" fill="#FFE4E1" opacity="0.8"/>
    <rect x="-100" y="0" width="80" height="40" rx="4" fill="#E0F7FA" opacity="0.8"/>
    <rect x="-100" y="50" width="80" height="50" rx="4" fill="#FFF3E0" opacity="0.8"/>
    
    
    <!-- Manga panel lines (right page) -->
    <rect x="20" y="-60" width="80" height="70" rx="4" fill="#F3E5F5" opacity="0.8"/>
    <rect x="20" y="20" width="80" height="40" rx="4" fill="#E8F5E9" opacity="0.8"/>
    <rect x="20" y="70" width="80" height="30" rx="4" fill="#FFF9C4" opacity="0.8"/>
    
    
    <!-- Cherry blossom petals -->
    <ellipse cx="-140" cy="-140" rx="20" ry="12" fill="#FFB6C1" transform="rotate(-30 -140 -140)"/>
    <circle cx="-135" cy="-145" r="8" fill="#FFB6C1"/>
    <circle cx="-145" cy="-135" r="8" fill="#FFB6C1"/>
    <circle cx="-130" cy="-135" r="6" fill="#FF69B4"/
    
    
    <ellipse cx="140" cy="-100" rx="18" ry="10" fill="#FFB6C1" transform="rotate(45 140 -100)"/>
    <circle cx="145" cy="-105" r="7" fill="#FFB6C1"/>
    <circle cx="135" cy="-95" r="7" fill="#FFB6C1"/>
    <circle cx="150" cy="-95" r="5" fill="#FF69B4"/>
    
    
    <ellipse cx="-100" cy="150" rx="16" ry="9" fill="#FFB6C1" transform="rotate(-15 -100 150)"/>
    <circle cx="-95" cy="146" r="6" fill="#FFB6C1"/>
    <circle cx="-105" cy="154" r="6" fill="#FFB6C1"/>
    <circle cx="-90" cy="154" r="4" fill="#FF69B4"/>
    
    
    <ellipse cx="130" cy="160" rx="15" ry="8" fill="#FFB6C1" transform="rotate(60 130 160)"/>
    <circle cx="135" cy="156" r="5" fill="#FFB6C1"/>
    <circle cx="125" cy="164" r="5" fill="#FFB6C1"/>
    <circle cx="140" cy="164" r="4" fill="#FF69B4"/>
  </g>
  
  <!-- Glow effect behind book -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#FFF" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#FFF" stroke-width="1" opacity="0.2"/>
</svg>
