name: 🏷️ Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      
    - name: ☕ Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: 🐘 Set up Gradle
      uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

    - name: 🔑 Decode Keystore
      run: |
        KEYSTORE_PATH=$(mktemp /tmp/otaku-reader-XXXXXX.keystore)
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
        echo "storeFile=$KEYSTORE_PATH" > keystore.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

    - name: 🔑 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔨 Build Release
      run: ./gradlew assembleRelease --no-daemon
      env:
        CI: true

    # TODO: Re-enable license report and SBOM after fixing variant resolution
    # See: https://github.com/HeartlessVeteran2/Otaku-Reader/issues/783
    # - name: 📋 Generate Dependency License Report
    #   run: ./gradlew :app:generateLicenseReport --no-daemon --no-configuration-cache
    #   env:
    #     CI: true
    #
    # - name: 🔍 Generate SBOM (CycloneDX)
    #   run: ./gradlew :app:cyclonedxBom --no-daemon --no-configuration-cache
    #   env:
    #     CI: true

    - name: 📝 Generate Release Notes
      run: |
        echo "## 🌸 Otaku Reader ${{ github.ref_name }}" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### What's New" >> RELEASE_NOTES.md
        echo "- See [CHANGELOG.md](CHANGELOG.md) for details" >> RELEASE_NOTES.md
        
    - name: 🚀 Create Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        body_path: RELEASE_NOTES.md
        files: |
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
