name: 🏷️ Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── Quality gate — must pass before the release artifact is built ────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔐 Security check
        run: bash scripts/check-buildconfig-security.sh

      - name: 🔍 Detekt
        run: ./gradlew detekt --no-daemon
        env:
          CI: true

      - name: 🎨 Ktlint
        run: ./gradlew ktlintCheck --no-daemon
        env:
          CI: true

      - name: 🧪 Unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
        env:
          CI: true

      - name: 📊 Coverage gate
        run: ./gradlew :domain:koverVerify :data:koverVerifyDebug --no-daemon
        env:
          CI: true

  # ── Release build — only runs after validate passes ──────────────────────────
  release:
    name: Build & Publish
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: ☕ Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: 🐘 Set up Gradle
      uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

    - name: 🔑 Decode Keystore
      run: |
        KEYSTORE_PATH=$(mktemp /tmp/otaku-reader-XXXXXX.keystore)
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
        echo "storeFile=$KEYSTORE_PATH" > keystore.properties
        echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
        echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
        echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties
        echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

    - name: 🔑 Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: 🔨 Build Release
      run: ./gradlew assembleRelease --no-daemon
      env:
        CI: true

    - name: 🧹 Clean up keystore
      if: always()
      run: |
        rm -f "$KEYSTORE_PATH"
        rm -f keystore.properties

    # TODO: Re-enable license report and SBOM after fixing variant resolution
    # See: https://github.com/HeartlessVeteran2/Otaku-Reader/issues/783
    # - name: 📋 Generate Dependency License Report
    #   run: ./gradlew :app:generateLicenseReport --no-daemon --no-configuration-cache
    #   env:
    #     CI: true
    #
    # - name: 🔍 Generate SBOM (CycloneDX)
    #   run: ./gradlew :app:cyclonedxBom --no-daemon --no-configuration-cache
    #   env:
    #     CI: true

    - name: 📝 Generate Release Notes
      run: |
        echo "## 🌸 Otaku Reader ${{ github.ref_name }}" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### What's New" >> RELEASE_NOTES.md
        echo "- See [CHANGELOG.md](CHANGELOG.md) for details" >> RELEASE_NOTES.md

    - name: 🚀 Create Release
      uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
      with:
        body_path: RELEASE_NOTES.md
        files: |
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
