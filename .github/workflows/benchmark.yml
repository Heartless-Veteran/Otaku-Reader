name: Benchmark

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  benchmark:
    name: Build Time Benchmark
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Build Time Benchmark
        run: |
          echo "## Build Time Benchmark" > benchmark.md
          echo "" >> benchmark.md
          echo "| Step | Time |" >> benchmark.md
          echo "|------|------|" >> benchmark.md

          START=$(date +%s)
          ./gradlew :app:assembleDebug --no-daemon
          END=$(date +%s)
          echo "| Debug Build | $((END-START))s |" >> benchmark.md

      - name: Upload Benchmark Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: benchmark-results
          path: benchmark.md
          retention-days: 30

  # Runtime macrobenchmarks (#1022): StartupBenchmarks + PerformanceBenchmarks on a
  # Gradle Managed Device (Pixel 6, API 34). Manual dispatch only — emulator jobs are
  # too slow/flaky to gate every PR. The same run also exercises
  # BaselineProfileGenerator; its collected profile is uploaded as an artifact for
  # manual refresh of app/src/main/baseline-prof.txt (the androidx.baselineprofile
  # Gradle plugin does not support AGP 9, so the copy step is manual by design).
  macrobenchmark:
    name: Macrobenchmarks (managed device)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "system-images;android-34;aosp_atd;x86_64" \
            "emulator"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run macrobenchmarks on managed device
        run: |
          ./gradlew :baselineprofile:pixel6Api34BenchmarkAndroidTest \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            --no-daemon
        env:
          CI: true

      - name: Upload benchmark results and collected profiles
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: macrobenchmark-results-${{ github.run_number }}
          path: |
            baselineprofile/build/outputs/androidTest-results/
            baselineprofile/build/outputs/managed_device_android_test_additional_output/
          retention-days: 90
