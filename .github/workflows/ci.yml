name: Android CI

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871

      - name: Setup Java
        uses: actions/setup-java@b36c23c0d998641eff861008f374ee103c25ac73
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275a4022e6d55671bc5ce3e30f10
        with:
          gradle-version: "9.3.1"

      - name: Build
        run: ./gradlew assembleDebug

      - name: Run unit tests
        run: ./gradlew test
