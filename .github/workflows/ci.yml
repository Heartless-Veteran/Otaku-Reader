name: CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  # ── Security ─────────────────────────────────────────────────────────────────
  security:
    name: Security Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🔐 Run BuildConfig security check
        run: bash scripts/check-buildconfig-security.sh

  # ── Static Analysis ───────────────────────────────────────────────────────────
  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔍 Run Detekt
        run: ./gradlew detekt --no-daemon
        env:
          CI: true

  # ── Unit Tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 📱 Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🧪 Run Unit Tests
        id: tests
        run: ./gradlew testDebugUnitTest --no-daemon
        env:
          CI: true
        continue-on-error: true

      - name: 📤 Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: test-results-${{ github.run_number }}
          path: '**/build/test-results/**/*.xml'
          retention-days: 14


      - name: 🚨 Fail if any tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  # ── Coverage Gate ─────────────────────────────────────────────────────────────
  coverage:
    name: Coverage Gate (≥60% on :domain and :data)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 📱 Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📊 Verify coverage ≥60% on :domain and :data
        run: ./gradlew :domain:koverVerify :data:koverVerify --no-daemon
        env:
          CI: true

      - name: 📈 Generate Kover HTML reports
        if: always()
        run: ./gradlew :domain:koverHtmlReport :data:koverHtmlReport --no-daemon
        env:
          CI: true

      - name: 📤 Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: coverage-reports-${{ github.run_number }}
          path: |
            domain/build/reports/kover/html/
            data/build/reports/kover/htmlDebug/
          retention-days: 14

  # ── Assemble ─────────────────────────────────────────────────────────────────
  assemble:
    name: Assemble
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 📱 Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0"

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🔨 Build Debug
        run: ./gradlew assembleDebug --no-daemon
        env:
          CI: true

      - name: 📊 Upload Build Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: app-debug-${{ github.run_number }}
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ── Screenshot Tests ──────────────────────────────────────────────────────────
  screenshot-tests:
    name: Screenshot Tests (Roborazzi)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 📱 Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;35.0.0"

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🖼️ Verify screenshot goldens
        run: |
          ./gradlew \
            :feature:library:testDebugUnitTest \
            :feature:reader:testDebugUnitTest \
            -Proborazzi.test.verify=true \
            --tests "app.otakureader.feature.library.screenshot.*" \
            --tests "app.otakureader.feature.reader.screenshot.*" \
            --no-daemon
        env:
          CI: true

      - name: 📤 Upload screenshot diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: screenshot-diffs-${{ github.run_number }}
          path: |
            feature/library/build/outputs/roborazzi/
            feature/reader/build/outputs/roborazzi/
          retention-days: 7

  # ── Ktlint ───────────────────────────────────────────────────────────────────
  ktlint:
    name: Ktlint
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 🎨 Run ktlintCheck
        run: ./gradlew ktlintCheck --no-daemon
        env:
          CI: true

  # ── Dependency License Report ─────────────────────────────────────────────────
  license-report:
    name: Dependency License Report
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: 🔑 Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: 📋 Generate Dependency License Report
        run: ./gradlew :app:generateLicenseReport --no-daemon
        env:
          CI: true

      - name: 📤 Upload License Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: dependency-licenses-${{ github.run_number }}
          path: docs/DEPENDENCY_LICENSES.md
          retention-days: 90
