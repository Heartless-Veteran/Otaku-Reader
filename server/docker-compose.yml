version: '3.8'

services:
  otaku-reader-sync:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: otaku-reader-sync
    ports:
      - "${PORT:-8080}:8080"
    environment:
      # Required: Authentication token (change this!)
      - AUTH_TOKEN=${AUTH_TOKEN:-your-secure-token-here}
      # Optional: Host and port configuration
      - HOST=0.0.0.0
      - PORT=8080
      # Optional: Storage path inside container
      - STORAGE_PATH=/app/data
    volumes:
      # Persist sync data outside container
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
